name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bookstore
          POSTGRES_USER: bookstore_user
          POSTGRES_PASSWORD: bookstore_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bookstore_user -d bookstore"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_DB: bookstore
      POSTGRES_USER: bookstore_user
      POSTGRES_PASSWORD: bookstore_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run migrations
        run: poetry run python manage.py migrate

      - name: Run tests
        run: poetry run pytest -v

      - name: Build Docker image
        run: docker build -t bookstore-drf .